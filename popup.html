<!doctype html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="container">
    <!-- Header -->
    <header>
      <div class="header-icon">
        <img src="icons/nevis-logo.png" alt="لوگو نویس" class="header-logo-img" onerror="this.style.display = 'none'" />
      </div>
      <div class="header-text">
        <h1>نویس</h1>
      </div>
    </header>

    <main>
      <!-- Font Selection -->
      <div class="control-box">
        <div class="top-bar">
        <label for="font-select" class="box-title">فونت</label>
        
          <button id="reset-btn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
              <path d="M3 3v5h5"></path>
            </svg>
          </button>
        </div>
        <div class="select-wrapper">
          <select id="font-select" class="custom-select">
            <option value="">بدون تغییر (پیش‌فرض)</option>
            <option value="Vazirmatn">وزیرمتن</option>
            <option value="Shabnam">شبنم</option>
            <option value="Lalezar">لاله زار</option>
            <option value="Kara">کارا</option>
            <option value="Gandom">گندم</option>
          </select>
          <svg class="select-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </div>
      </div>

      <!-- RTL Toggle -->
      <div class="control-box row-box">
        <div class="box-info">
          <span class="box-title">راست چین (RTL)</span>
        </div>
        <label class="toggle" for="toggle-rtl">
          <input type="checkbox" id="toggle-rtl" class="toggle-input" />
          <span class="toggle-track">
            <span class="toggle-thumb">
              <svg class="check-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </span>
          </span>
        </label>
      </div>
    </main>
  </div>

  <script src="popup.js"></script>
</body>

</html>
