<!doctype html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="container">
    <header>
      <div class="header-brand">
        <div class="header-icon">
          <img src="icons/nevis-logo.png" alt="لوگو نویس" class="header-logo-img" onerror="this.style.display = 'none'" />
          <div class="logo-fallback-glow"></div>
        </div>
        <div class="header-text">
          <h1>نویس</h1>
        </div>
      </div>
    </header>

    <main>
      <section class="control-card">
        <div class="card-header">
          <div class="card-title-group1">
            <label for="font-select" class="card-title" id="font-title">فونت</label>
          </div>
          
          <button id="reset-btn" aria-label="پیش‌فرض" title="حالت پیش‌فرض">
            <svg class="reset-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
              <path d="M3 3v5h5"></path>
            </svg>
            <span>پیش‌فرض</span>
          </button>
        </div>
        
        <div class="select-wrapper">
          <select id="font-select" class="custom-select">
            <option value="">بدون تغییر (پیش‌فرض)</option>
            <option value="Vazirmatn">وزیرمتن</option>
            <option value="Shabnam">شبنم</option>
            <option value="Lalezar">لاله زار</option>
            <option value="Kara">کارا</option>
            <option value="Gandom">گندم</option>
          </select>
          <div class="select-arrow">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
        </div>
      </section>

      <section class="control-card row-card">
        <div class="card-info">
          <div class="card-title-group2">
            <span class="card-title">راست‌چین  (RTL)</span>
          </div>
        </div>
        
        <label class="toggle-switch" for="toggle-rtl">
          <input type="checkbox" id="toggle-rtl" class="toggle-input" />
          <span class="toggle-track">
            <span class="toggle-thumb">
              <svg class="check-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </span>
          </span>
        </label>
      </section>
    </main>

    <footer>
      <div class="status-indicator">
        <span class="status-text"> پشتیبانی از</span>
      </div>
      <div class="status-indicator">
        <img src="icons/logos/notbooklm-icon.png"/>
        <img src="icons/logos/grok-icon.svg"/>
        <img src="icons/logos/perplexity-icon.png"/>
        <img src="icons/logos/mistral-icon.png"/>
        <img src="icons/logos/qwen-icon.png"/>
        <img src="icons/logos/gpt-icon.ico"/>
        <img src="icons/logos/cluad-icon.png"/>
        <img src="icons/logos/deep-seek-icon.svg"/>
        <img src="icons/logos/ai-studio-icon.png"/>
      </div>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>

</html>
