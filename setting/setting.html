<!-- مودال افزودن سایت -->
<div class="modal-overlay" id="addSiteModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>افزودن سایت دلخواه</h3>
      <button class="modal-close" id="modal-close-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="input-group">
        <label for="siteUrl">آدرس سایت (URL)</label>
        <input
          type="text"
          id="siteUrl"
          placeholder="example.com یا https://example.com"
          dir="ltr"
        />
        <span class="error-message" id="urlError">لطفاً یک آدرس معتبر وارد کنید</span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="modal-btn modal-btn-secondary" id="modal-cancel-btn">
        انصراف
      </button>
      <button class="modal-btn modal-btn-primary" id="addSiteBtn">
        <span id="addBtnText">افزودن</span>
        <span class="loading-spinner" id="loadingSpinner"></span>
      </button>
    </div>
  </div>
