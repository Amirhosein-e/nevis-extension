                                    <svg class="check-icon" width="10" height="10" viewBox="0 0 24 24" fill="none"
                                        stroke="currentColor" stroke-width="3" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <polyline points="20 6 9 17 4 12"></polyline>
                                    </svg>
                                </span>
                            </span>
                        </label>
                    </div>

                    <div class="grid-box" data-site="perplexity.ai">
                        <img src="../icons/logos/perplexity-icon.png" alt="Perplexity" />
                        <label class="toggle-switch">
                            <input type="checkbox" class="toggle-input rtl-toggle" data-site="perplexity.ai" />
                            <span class="toggle-track">
                                <span class="toggle-thumb">
                                    <svg class="check-icon" width="10" height="10" viewBox="0 0 24 24" fill="none"
                                        stroke="currentColor" stroke-width="3" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <polyline points="20 6 9 17 4 12"></polyline>
                                    </svg>
                                </span>
                            </span>
                        </label>
                    </div>

                    <div class="grid-box" data-site="mistral.ai">
                        <img src="../icons/logos/mistral-logo.png" alt="Mistral" />
                        <label class="toggle-switch">
                            <input type="checkbox" class="toggle-input rtl-toggle" data-site="mistral.ai" />
                            <span class="toggle-track">
                                <span class="toggle-thumb">
                                    <svg class="check-icon" width="10" height="10" viewBox="0 0 24 24" fill="none"
                                        stroke="currentColor" stroke-width="3" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <polyline points="20 6 9 17 4 12"></polyline>
                                    </svg>
                                </span>
                            </span>
                        </label>
                    </div>

                    <div class="grid-box" data-site="notebooklm.google.com">
                        <img src="../icons/logos/notbooklm-logo.svg" alt="NotebookLM" />
                        <label class="toggle-switch">
                            <input type="checkbox" class="toggle-input rtl-toggle" data-site="notebooklm.google.com" />
                            <span class="toggle-track">
                                <span class="toggle-thumb">
                                    <svg class="check-icon" width="10" height="10" viewBox="0 0 24 24" fill="none"
                                        stroke="currentColor" stroke-width="3" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <polyline points="20 6 9 17 4 12"></polyline>
                                    </svg>
                                </span>
                            </span>
                        </label>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- بخش زیرین کارت شیشه‌ای (خارج از کارت) -->
    <div class="outer-footer">
        <span>تقدیم به همه فارسی زبانان</span>
        <svg class="heart-pulse" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- گرادیانت شیشه‌ای قلب -->
                <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.65" />
                    <stop offset="40%" stop-color="#a8d8ff" stop-opacity="0.45" />
                    <stop offset="100%" stop-color="#4a90e2" stop-opacity="0.75" />
                </linearGradient>

                <!-- حاشیه شیشه‌ای -->
                <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
                    <stop offset="50%" stop-color="#88c8ff" stop-opacity="0.5" />
                    <stop offset="100%" stop-color="#ffffff" stop-opacity="0.7" />
                </linearGradient>

                <!-- بازتاب نور -->
                <radialGradient id="highlight" cx="35%" cy="25%" r="30%">
                    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
                    <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
                </radialGradient>

                <!-- فیلتر سایه داخلی ملایم -->
                <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="6" />
                    <feOffset dx="0" dy="8" result="offsetblur" />
                    <feComponentTransfer>
                        <feFuncA type="linear" slope="0.4" />
                    </feComponentTransfer>
                    <feMerge>
                        <feMergeNode />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>

            <!-- قلب شیشه‌ای با سایه بدون پس‌زمینه رنگی -->
            <g filter="url(#shadow)">
                <path d="M200,340 
               C200,340 60,240 60,150 
               C60,90 110,60 160,90 
               C185,105 200,130 200,150 
               C200,130 215,105 240,90 
               C290,60 340,90 340,150 
               C340,240 200,340 200,340 Z" fill="url(#glassGrad)" stroke="url(#borderGrad)" stroke-width="2" />
            </g>

            <!-- بازتاب نور روی قلب -->
            <path d="M200,340 
             C200,340 60,240 60,150 
             C60,90 110,60 160,90 
             C185,105 200,130 200,150 
             C200,130 215,105 240,90 
             C290,60 340,90 340,150 
             C340,240 200,340 200,340 Z" fill="url(#highlight)" />

            <!-- نقاط درخشان شیشه -->
            <ellipse cx="140" cy="130" rx="25" ry="15" fill="#ffffff" opacity="0.5" transform="rotate(-30 140 130)" />
            <ellipse cx="125" cy="155" rx="10" ry="6" fill="#ffffff" opacity="0.4" transform="rotate(-30 125 155)" />
        </svg>
    </div>

    <!-- مودال افزودن سایت -->
    <div class="modal-overlay" id="addSiteModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>افزودن سایت دلخواه</h3>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label for="siteUrl">آدرس سایت (URL)</label>
                    <input type="text" id="siteUrl" placeholder="example.com یا https://example.com" dir="ltr" />
                    <span class="error-message" id="urlError">لطفاً یک آدرس معتبر وارد کنید</span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-secondary" id="modal-cancel-btn">
                    انصراف
                </button>
                <button class="modal-btn modal-btn-primary" id="addSiteBtn">
                    <span id="addBtnText">افزودن</span>
                    <span class="loading-spinner" id="loadingSpinner"></span>
                </button>
            </div>
        </div>
    </div>

    <script src="setting.js"></script>
</body>

</html>
